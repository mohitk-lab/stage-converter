<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RUHI — Multilingual Studio</title>
    <meta name="description" content="Convert scripts across 16 Indian languages — Hindi, English, Tamil, Telugu, Kannada, Malayalam, Bengali, Gujarati, Punjabi, Marathi, Urdu & more. Authentic regional conversion with AI." />
    <meta name="theme-color" content="#f59e0b" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <!-- manifest removed to prevent PWA caching -->
    <link rel="apple-touch-icon" href="/icon-192.svg" />
    <link rel="icon" type="image/svg+xml" href="/icon-192.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      body { background: #f0ebe3; }
      ::-webkit-scrollbar { width: 5px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: rgba(245,158,11,0.3); border-radius: 3px; }
      ::selection { background: rgba(245,158,11,0.22); color: #fff; }
      @keyframes spin { to { transform: rotate(360deg); } }
      @media (max-width: 900px) {
        .converter-cols { flex-direction: column !important; }
        .top-controls-row { flex-direction: column !important; }
        .top-controls-row .tone-sidebar { width: 100% !important; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      // Kill all service workers and purge caches — no more stale content
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(regs) {
          for (var i = 0; i < regs.length; i++) regs[i].unregister();
        });
        if (window.caches) caches.keys().then(function(keys) {
          for (var i = 0; i < keys.length; i++) caches.delete(keys[i]);
        });
      }
    </script>
  </body>
</html>
