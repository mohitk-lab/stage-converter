<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RUHI — Multilingual Studio</title>
    <meta name="description" content="Auto-detect any language and convert scripts to Hindi, English, Haryanvi, Rajasthani, Bhojpuri, Gujarati. Authentic regional conversion with glassmorphic UI." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      body { background: #f0ebe3; }
      ::-webkit-scrollbar { width: 5px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: rgba(245,158,11,0.3); border-radius: 3px; }
      ::selection { background: rgba(245,158,11,0.22); color: #fff; }
      @keyframes spin { to { transform: rotate(360deg); } }
      @media (max-width: 900px) {
        .converter-cols { flex-direction: column !important; }
        .top-controls-row { flex-direction: column !important; }
        .top-controls-row .tone-sidebar { width: 100% !important; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
